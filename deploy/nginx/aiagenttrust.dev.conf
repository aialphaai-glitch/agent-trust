# ── Agent Trust Protocol — nginx reverse proxy ───────────────────────────────
# Apex + www  → profile server (:4546)
# ledger.*    → ledger service (:4545)
# Certificates issued by certbot (see deploy/scripts/server-bootstrap.sh)

# HTTP → HTTPS redirects (all hosts)
server {
    listen 80;
    listen [::]:80;
    server_name aiagenttrust.dev www.aiagenttrust.dev ledger.aiagenttrust.dev;

    # ACME challenge still served over HTTP during renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Profile (apex + www) ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aiagenttrust.dev www.aiagenttrust.dev;

    ssl_certificate     /etc/letsencrypt/live/aiagenttrust.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiagenttrust.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow the badge to be iframed anywhere (this is intentional for adoption)
    # The profile page itself uses default same-origin framing.

    access_log /var/log/nginx/atp-profile.access.log;
    error_log  /var/log/nginx/atp-profile.error.log;

    location / {
        proxy_pass http://127.0.0.1:4546;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# ─── Ledger ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ledger.aiagenttrust.dev;

    ssl_certificate     /etc/letsencrypt/live/ledger.aiagenttrust.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ledger.aiagenttrust.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Basic abuse control — 10 req/s per IP with a 20 req burst.
    # Tune once you see real traffic.
    limit_req zone=atp_ledger burst=20 nodelay;
    limit_req_status 429;

    # Request body cap — attestations are small JSON docs
    client_max_body_size 64k;

    access_log /var/log/nginx/atp-ledger.access.log;
    error_log  /var/log/nginx/atp-ledger.error.log;

    location / {
        proxy_pass http://127.0.0.1:4545;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
