<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found · Agent Trust Protocol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050812;
    --bg-elev: #0a0f1e;
    --border: #1a2540;
    --text: #d8e4f8;
    --text-dim: #7090b8;
    --text-faint: #3a5070;
    --accent: #4a9eff;
    --accent-glow: rgba(74, 158, 255, 0.15);
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 30%, rgba(74, 158, 255, 0.08) 0%, transparent 50%);
    pointer-events: none;
  }
  .wrap {
    max-width: 520px; text-align: center; position: relative;
  }
  .code {
    font-family: var(--mono); font-size: 14px;
    color: var(--accent); letter-spacing: 0.2em;
    margin-bottom: 20px; text-transform: uppercase;
  }
  h1 {
    font-family: var(--serif);
    font-size: 64px; font-weight: 400;
    line-height: 1.1; letter-spacing: -0.02em;
    margin-bottom: 20px;
    font-variation-settings: 'opsz' 144;
  }
  p {
    color: var(--text-dim); font-size: 16px; line-height: 1.6;
    margin-bottom: 32px;
  }
  .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 22px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    text-decoration: none;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn.primary:hover { background: var(--accent); color: white; }

  .mark {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #0e2a6e, var(--accent));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: white;
    margin: 0 auto 28px;
    box-shadow: 0 0 24px var(--accent-glow);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">⬡</div>
  <div class="code">404 · Not found</div>
  <h1>This DID doesn't resolve.</h1>
  <p>
    Either the agent was never registered on this ledger, or the URL is malformed.
    Every registered agent is listed in the public directory.
  </p>
  <div class="actions">
    <a href="/agents" class="btn primary">Browse agents</a>
    <a href="/" class="btn">Home</a>
    <a href="/docs" class="btn">Docs</a>
  </div>
</div>
</body>
</html>
